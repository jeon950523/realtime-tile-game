spring:
  application:
    name: realtime-tile-game-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/realtime_tile_game?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: 3000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  auth:
    jwt:
      issuer: ${JWT_ISSUER:realtime-tile-game}
      audience: ${JWT_AUDIENCE:realtime-tile-game-web}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
      access-secret-base64: ${JWT_ACCESS_SECRET_BASE64}
    refresh:
      token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:2592000}
      cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}
      cookie-name: ${AUTH_REFRESH_COOKIE_NAME:rtg_refresh}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{gameId:-},%X{actionId:-}]"
