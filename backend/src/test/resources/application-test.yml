spring:
  datasource:
    url: jdbc:h2:mem:realtime_tile_game;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  auth:
    jwt:
      issuer: realtime-tile-game
      audience: realtime-tile-game-web
      access-token-ttl-seconds: 1800
      access-secret-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    refresh:
      token-ttl-seconds: 2592000
      cookie-secure: false
      cookie-name: rtg_refresh
