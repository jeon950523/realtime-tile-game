apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: realtime-tile-game
  labels:
    app.kubernetes.io/name: realtime-tile-game
    app.kubernetes.io/part-of: realtime-tile-game
    app.kubernetes.io/component: mysql
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-tile-game
      app.kubernetes.io/component: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-tile-game
        app.kubernetes.io/part-of: realtime-tile-game
        app.kubernetes.io/component: mysql
        app.kubernetes.io/managed-by: kubectl
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql
          image: mysql:8.4.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: realtime-tile-game-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: realtime-tile-game-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: realtime-tile-game-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: realtime-tile-game-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: realtime-tile-game-config
                  key: TZ
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysqladmin ping --protocol=socket -uroot --silent
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysql --protocol=socket -uroot --silent --skip-column-names -e 'SELECT 1' >/dev/null
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysqladmin ping --protocol=socket -uroot --silent
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
        labels:
          app.kubernetes.io/name: realtime-tile-game
          app.kubernetes.io/part-of: realtime-tile-game
          app.kubernetes.io/component: mysql
          app.kubernetes.io/managed-by: kubectl
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
