apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: realtime-tile-game
  labels:
    app.kubernetes.io/name: realtime-tile-game
    app.kubernetes.io/part-of: realtime-tile-game
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realtime-tile-game
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realtime-tile-game
        app.kubernetes.io/part-of: realtime-tile-game
        app.kubernetes.io/component: frontend
        app.kubernetes.io/managed-by: kubectl
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: realtime-tile-game-frontend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
